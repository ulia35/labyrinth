<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Лабиринт · выбери зверя</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1b3a3a 0%, #2b5a4f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 12px;
      touch-action: manipulation;
    }

    .game-wrapper {
      background: rgba(250, 242, 228, 0.88);
      backdrop-filter: blur(4px);
      border-radius: 40px 40px 32px 32px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px #f0e2cc;
      max-width: 500px;
      width: 100%;
      transition: all 0.25s;
    }

    h1 {
      font-weight: 400;
      letter-spacing: 2px;
      color: #f2eadb;
      text-shadow: 0 4px 12px #1e3d32;
      background: #2a5a4a;
      display: inline-block;
      padding: 4px 24px;
      border-radius: 60px;
      margin-bottom: 16px;
      font-size: 1.4rem;
      box-shadow: inset 0 -3px 0 #1a3d30;
      backdrop-filter: blur(2px);
    }

    /* ---------- ЭКРАН ВЫБОРА ---------- */
    .selection-screen {
      background: #e8ddca;
      border-radius: 36px;
      padding: 20px 14px 24px;
      margin: 6px 0 8px;
      box-shadow: inset 0 2px 12px rgba(0,0,0,0.08), 0 8px 18px rgba(0,20,10,0.2);
      text-align: center;
    }

    .selection-screen h2 {
      font-weight: 400;
      font-size: 1.5rem;
      color: #2c4d3e;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .animal-grid {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 8px 0 20px;
    }

    .animal-card {
      background: #faf1e0;
      border-radius: 60px;
      padding: 8px 14px 6px;
      box-shadow: 0 4px 0 #b3a184, 0 8px 16px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: all 0.1s ease;
      border: 3px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
      touch-action: manipulation;
    }

    .animal-card:active {
      transform: scale(0.95);
    }

    .animal-card.active {
      border: 3px solid #f5b342;
      transform: scale(1.02);
      box-shadow: 0 3px 0 #9e7f5e, 0 0 0 3px #ffe3a0;
      background: #fff7e8;
    }

    .animal-card .emoji {
      font-size: 2.8rem;
      line-height: 1.2;
    }

    .animal-card .label {
      font-size: 0.75rem;
      color: #3d5a47;
      font-weight: 500;
      letter-spacing: 1px;
      background: #e2d2b8;
      padding: 0 10px;
      border-radius: 30px;
      margin-top: 2px;
    }

    .btn-start {
      background: #3b6b58;
      border: none;
      font-size: 1.3rem;
      padding: 12px 32px;
      border-radius: 60px;
      color: #f7f0df;
      font-weight: 500;
      letter-spacing: 2px;
      box-shadow: 0 6px 0 #1e4033, 0 8px 24px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: all 0.06s;
      margin-top: 6px;
      width: 100%;
      max-width: 280px;
      touch-action: manipulation;
    }

    .btn-start:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #1e4033;
    }

    /* ---------- ИГРОВОЙ ИНТЕРФЕЙС ---------- */
    .game-ui {
      display: none;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .animal-indicator {
      background: #d9cdb0;
      padding: 4px 14px 4px 10px;
      border-radius: 60px;
      font-size: 1.5rem;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.1), 0 4px 10px rgba(0,20,10,0.12);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .animal-indicator span {
      background: #fcf3e0;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 1rem;
      color: #2b4d3a;
    }

    .level-info {
      background: #2a4d44;
      color: #efe6d3;
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 1px;
      box-shadow: inset 0 -3px 0 #17322b;
    }

    .canvas-container {
      display: flex;
      justify-content: center;
      margin: 6px 0 10px;
      background: #dccfb8;
      border-radius: 32px;
      padding: 10px;
      box-shadow: inset 0 0 0 2px #b8a78a, inset 0 8px 16px rgba(0,0,0,0.12);
      position: relative;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      background: #fcf5e6;
      border-radius: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      image-rendering: crisp-edges;
      touch-action: none;
    }

    /* ---------- ОВЕРЛЕЙ ПОБЕДЫ ---------- */
    .win-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      background: rgba(44, 70, 50, 0.9);
      backdrop-filter: blur(6px);
      border-radius: 24px;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px;
      z-index: 10;
      animation: fadeIn 0.3s ease;
    }

    .win-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .win-overlay .trophy {
      font-size: 3.5rem;
      line-height: 1;
    }

    .win-overlay .win-title {
      font-size: 1.8rem;
      font-weight: 600;
      color: #f7f0df;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
      letter-spacing: 2px;
    }

    .win-overlay .win-sub {
      font-size: 1rem;
      color: #e8ddc8;
      margin-bottom: 4px;
    }

    .win-overlay .win-btn {
      background: #f5c542;
      border: none;
      font-size: 1.2rem;
      padding: 12px 36px;
      border-radius: 60px;
      color: #2a4a38;
      font-weight: 600;
      letter-spacing: 1.5px;
      box-shadow: 0 5px 0 #b58a2a, 0 8px 20px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: all 0.06s;
      margin-top: 4px;
      touch-action: manipulation;
    }

    .win-overlay .win-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #b58a2a;
    }

    /* ---------- УПРАВЛЕНИЕ (клавиши + сенсор) ---------- */
    .controls-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 10px 0 6px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: #e8dcc8;
      border: none;
      font-size: 1.2rem;
      padding: 6px 20px;
      border-radius: 60px;
      box-shadow: 0 4px 0 #9b8a74, 0 6px 16px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: all 0.05s;
      font-weight: 500;
      color: #2d4a3b;
      min-width: 90px;
      touch-action: manipulation;
    }

    .ctrl-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #7d6e5a;
    }

    .ctrl-btn.reset-btn {
      background: #cbb79b;
      color: #2b3d2b;
    }

    /* Сенсорные кнопки направления */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-width: 200px;
      margin: 8px auto 4px;
      touch-action: manipulation;
    }

    .dpad-btn {
      background: #e8dcc8;
      border: none;
      border-radius: 16px;
      padding: 14px 0;
      font-size: 1.8rem;
      box-shadow: 0 4px 0 #9b8a74, 0 4px 12px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.05s;
      color: #2d4a3b;
      touch-action: manipulation;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dpad-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #7d6e5a;
    }

    .dpad-btn.empty {
      background: transparent;
      box-shadow: none;
      cursor: default;
      pointer-events: none;
    }

    .dpad-btn.empty:active {
      transform: none;
    }

    .message {
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      color: #2a463d;
      background: #eedcc6;
      padding: 8px 12px;
      border-radius: 60px;
      margin: 6px 0 2px;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid #dcc9ae;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.04);
    }

    .message span {
      font-size: 1.5rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 450px) {
      .game-wrapper { padding: 14px 10px 18px; }
      .animal-grid { gap: 10px; }
      .animal-card { min-width: 56px; padding: 6px 10px; }
      .animal-card .emoji { font-size: 2.2rem; }
      .ctrl-btn { font-size: 1rem; min-width: 70px; padding: 5px 14px; }
      .dpad-btn { min-height: 48px; font-size: 1.5rem; }
      .win-overlay .win-title { font-size: 1.5rem; }
      .win-overlay .win-btn { font-size: 1rem; padding: 10px 28px; }
      h1 { font-size: 1.2rem; padding: 4px 18px; }
    }

    @media (pointer: coarse) {
      .dpad-btn { min-height: 60px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div style="display: flex; justify-content: center;"><h1>🌿 Лабиринт</h1></div>

  <!-- ЭКРАН ВЫБОРА -->
  <div id="selectionScreen" class="selection-screen">
    <h2>🐾 выбери зверя</h2>
    <div class="animal-grid" id="animalGrid">
      <div class="animal-card active" data-animal="🐱"><span class="emoji">🐱</span><span class="label">кот</span></div>
      <div class="animal-card" data-animal="🐶"><span class="emoji">🐶</span><span class="label">пёс</span></div>
      <div class="animal-card" data-animal="🦊"><span class="emoji">🦊</span><span class="label">лис</span></div>
      <div class="animal-card" data-animal="🐭"><span class="emoji">🐭</span><span class="label">мышь</span></div>
    </div>
    <button class="btn-start" id="startGameBtn">🚀 выбрать и начать</button>
  </div>

  <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
  <div id="gameUI" class="game-ui">
    <div class="top-bar">
      <div class="animal-indicator">
        <span id="currentAnimalDisplay">🐱</span>
        <span id="animalNameLabel">кот</span>
      </div>
      <div class="level-info">Уровень <span id="levelDisplay">1</span></div>
    </div>

    <div class="canvas-container">
      <canvas id="mazeCanvas" width="500" height="500"></canvas>
      <!-- ОВЕРЛЕЙ ПОБЕДЫ -->
      <div class="win-overlay" id="winOverlay">
        <div class="trophy">🏆</div>
        <div class="win-title">Уровень пройден!</div>
        <div class="win-sub">✨ отличная работа ✨</div>
        <button class="win-btn" id="nextLevelBtn">▶ следующий уровень</button>
      </div>
    </div>

    <!-- Сенсорные кнопки (телефон) -->
    <div class="dpad" id="dpad">
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" data-dir="up">⬆</button>
      <div class="dpad-btn empty"></div>
      <button class="dpad-btn" data-dir="left">⬅</button>
      <button class="dpad-btn" data-dir="down">⬇</button>
      <button class="dpad-btn" data-dir="right">➡</button>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn reset-btn" id="resetBtn">⟳ Новый</button>
      <button class="ctrl-btn" id="nextBtn">▶ Уровень</button>
    </div>

    <div class="message" id="messageBox">
      <span>🐾</span> Двигайся к ⭐
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- элементы -----
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const levelSpan = document.getElementById('levelDisplay');
    const msgBox = document.getElementById('messageBox');
    const selectionScreen = document.getElementById('selectionScreen');
    const gameUI = document.getElementById('gameUI');
    const startBtn = document.getElementById('startGameBtn');
    const animalGrid = document.getElementById('animalGrid');
    const currentAnimalDisplay = document.getElementById('currentAnimalDisplay');
    const animalNameLabel = document.getElementById('animalNameLabel');
    const winOverlay = document.getElementById('winOverlay');
    const nextLevelBtn = document.getElementById('nextLevelBtn');

    // ----- размеры лабиринта -----
    const COLS = 13;
    const ROWS = 13;
    const CELL_SIZE = canvas.width / COLS;

    // ----- состояние -----
    let maze = [];
    let playerPos = { x: 0, y: 0 };
    let exitPos = { x: 0, y: 0 };
    let currentLevel = 1;
    let animalEmoji = '🐱';
    let animalName = 'кот';
    let gameStarted = false;
    let isWin = false;

    // ----- ГЕНЕРАЦИЯ ЛАБИРИНТА (DFS) -----
    function generateMaze(cols, rows) {
      const grid = Array(rows).fill().map(() => Array(cols).fill(0));
      const startX = 1, startY = 1;
      grid[startY][startX] = 1;
      
      const stack = [{ x: startX, y: startY }];
      const visited = new Set();
      visited.add(`${startX},${startY}`);
      
      const dirs = [[2, 0], [-2, 0], [0, 2], [0, -2]];
      
      while (stack.length > 0) {
        const current = stack[stack.length - 1];
        const { x, y } = current;
        
        const neighbors = [];
        for (const [dx, dy] of dirs) {
          const nx = x + dx;
          const ny = y + dy;
          if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1 && !visited.has(`${nx},${ny}`)) {
            neighbors.push({ x: nx, y: ny, dx: dx/2, dy: dy/2 });
          }
        }
        
        if (neighbors.length > 0) {
          const next = neighbors[Math.floor(Math.random() * neighbors.length)];
          grid[y + next.dy][x + next.dx] = 1;
          grid[next.y][next.x] = 1;
          visited.add(`${next.x},${next.y}`);
          stack.push({ x: next.x, y: next.y });
        } else {
          stack.pop();
        }
      }
      
      for (let i = 0; i < rows; i++) {
        grid[i][0] = 0;
        grid[i][cols-1] = 0;
      }
      for (let j = 0; j < cols; j++) {
        grid[0][j] = 0;
        grid[rows-1][j] = 0;
      }
      
      grid[1][1] = 1;
      grid[rows-2][cols-2] = 1;
      
      // Добавляем немного случайных проходов для разнообразия
      for (let i = 2; i < rows-2; i+=2) {
        for (let j = 2; j < cols-2; j+=2) {
          if (grid[i][j] === 0 && Math.random() < 0.08) {
            let walls = 0;
            const dirs2 = [[1,0],[-1,0],[0,1],[0,-1]];
            for (const [dx, dy] of dirs2) {
              if (grid[i+dy] && grid[i+dy][j+dx] === 0) walls++;
            }
            if (walls <= 2) {
              grid[i][j] = 1;
            }
          }
        }
      }
      
      return grid;
    }

    // ----- проверка достижимости (BFS) -----
    function isReachable(grid, start, exit) {
      const rows = grid.length, cols = grid[0].length;
      const visited = new Set();
      const queue = [{ x: start.x, y: start.y }];
      visited.add(`${start.x},${start.y}`);
      
      while (queue.length > 0) {
        const { x, y } = queue.shift();
        if (x === exit.x && y === exit.y) return true;
        
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const [dx, dy] of dirs) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && 
              grid[ny][nx] === 1 && !visited.has(`${nx},${ny}`)) {
            visited.add(`${nx},${ny}`);
            queue.push({ x: nx, y: ny });
          }
        }
      }
      return false;
    }

    // ----- создание гарантированно проходимого лабиринта -----
    function createValidMaze(cols, rows) {
      for (let attempt = 0; attempt < 100; attempt++) {
        const grid = generateMaze(cols, rows);
        const start = { x: 1, y: 1 };
        const exit = { x: cols-2, y: rows-2 };
        if (isReachable(grid, start, exit)) {
          return grid;
        }
      }
      // Fallback: простой лабиринт
      const grid = Array(rows).fill().map(() => Array(cols).fill(1));
      for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
          if (i === 0 || j === 0 || i === rows-1 || j === cols-1) grid[i][j] = 0;
          else if (i % 2 === 0 && j % 2 === 0) grid[i][j] = 0;
        }
      }
      for (let i = 1; i < rows-1; i++) {
        grid[i][1] = 1;
        grid[i][cols-2] = 1;
      }
      grid[1][1] = 1;
      grid[rows-2][cols-2] = 1;
      return grid;
    }

    // ----- размещение игрока и выхода -----
    function placePlayerAndExit(grid) {
      const rows = grid.length, cols = grid[0].length;
      const start = { x: 1, y: 1 };
      const exit = { x: cols-2, y: rows-2 };
      if (grid[exit.y][exit.x] === 0) grid[exit.y][exit.x] = 1;
      return { start, exit };
    }

    // ----- новый уровень -----
    function newLevel() {
      const grid = createValidMaze(COLS, ROWS);
      const { start, exit } = placePlayerAndExit(grid);
      maze = grid;
      playerPos = { x: start.x, y: start.y };
      exitPos = { x: exit.x, y: exit.y };
      isWin = false;
      winOverlay.classList.remove('show');
      drawMaze();
      updateMessage('🐾 Иди к ⭐', '#2a463d');
    }

    // ----- рисование -----
    function drawMaze() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const x = col * CELL_SIZE, y = row * CELL_SIZE;
          if (maze[row][col] === 0) {
            ctx.fillStyle = '#5d4c3a';
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
            ctx.fillStyle = '#7a624a';
            ctx.fillRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4);
          } else {
            ctx.fillStyle = '#f2e6d0';
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
            ctx.fillStyle = '#e0d1b6';
            ctx.fillRect(x+1, y+1, CELL_SIZE-2, CELL_SIZE-2);
          }
        }
      }

      const ex = exitPos.x * CELL_SIZE + CELL_SIZE/2;
      const ey = exitPos.y * CELL_SIZE + CELL_SIZE/2;
      ctx.font = `${CELL_SIZE * 0.7}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#f7d44a';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#f5c542';
      ctx.fillText('⭐', ex, ey-2);
      ctx.shadowBlur = 0;

      const px = playerPos.x * CELL_SIZE + CELL_SIZE/2;
      const py = playerPos.y * CELL_SIZE + CELL_SIZE/2;
      ctx.font = `${CELL_SIZE * 0.8}px "Segoe UI", sans-serif`;
      ctx.shadowColor = '#00000040';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#000000';
      ctx.fillText(animalEmoji, px, py-2);
      ctx.shadowBlur = 0;

      if (isWin) {
        ctx.font = `28px sans-serif`;
        ctx.fillStyle = '#f7b32b';
        ctx.shadowBlur = 30;
        ctx.fillText('✨', px-18, py-34);
        ctx.shadowBlur = 0;
      }
    }

    // ----- сообщение -----
    function updateMessage(text, color = '#2a463d') {
      msgBox.innerHTML = `<span>${animalEmoji}</span> ${text}`;
      msgBox.style.color = color;
    }

    // ----- проверка победы -----
    function checkWin() {
      if (playerPos.x === exitPos.x && playerPos.y === exitPos.y && !isWin) {
        isWin = true;
        winOverlay.classList.add('show');
        drawMaze();
        updateMessage('🎉 Победа!', '#b17f2e');
        return true;
      }
      return false;
    }

    // ----- движение -----
    function movePlayer(dx, dy) {
      if (!gameStarted || isWin) return;
      const newX = playerPos.x + dx;
      const newY = playerPos.y + dy;
      if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS) return;
      if (maze[newY][newX] === 0) return;

      playerPos.x = newX;
      playerPos.y = newY;
      drawMaze();

      if (!checkWin()) {
        updateMessage('🐾 Иди к ⭐', '#2a463d');
      }
    }

    // ----- сброс уровня -----
    function resetLevel() {
      if (!gameStarted) return;
      isWin = false;
      winOverlay.classList.remove('show');
      newLevel();
      updateMessage('🔄 Новый лабиринт', '#2a463d');
    }

    // ----- следующий уровень -----
    function nextLevel() {
      if (!gameStarted) return;
      currentLevel++;
      levelSpan.textContent = currentLevel;
      isWin = false;
      winOverlay.classList.remove('show');
      newLevel();
      updateMessage(`✨ Уровень ${currentLevel}`, '#2a463d');
    }

    // ----- запуск игры -----
    function startGame() {
      const activeCard = document.querySelector('.animal-card.active');
      if (activeCard) {
        animalEmoji = activeCard.dataset.animal;
        const label = activeCard.querySelector('.label');
        animalName = label ? label.textContent : 'зверь';
      } else {
        animalEmoji = '🐱';
        animalName = 'кот';
      }

      currentAnimalDisplay.textContent = animalEmoji;
      animalNameLabel.textContent = animalName;

      selectionScreen.classList.add('hidden');
      gameUI.style.display = 'block';
      gameStarted = true;

      currentLevel = 1;
      levelSpan.textContent = currentLevel;
      isWin = false;
      winOverlay.classList.remove('show');
      newLevel();
      updateMessage(`🐾 ${animalName} идёт к ⭐`, '#2a463d');
    }

    // ----- обработчики выбора персонажа -----
    document.querySelectorAll('.animal-card').forEach(card => {
      card.addEventListener('click', function() {
        document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
      });
      card.addEventListener('touchstart', function(e) {
        // Предотвращаем двойное срабатывание
      });
    });

    // ----- СЕНСОРНЫЕ КНОПКИ (телефон) -----
    document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
      const handler = (e) => {
        e.preventDefault();
        const dir = btn.dataset.dir;
        if (dir === 'up') movePlayer(0, -1);
        else if (dir === 'down') movePlayer(0, 1);
        else if (dir === 'left') movePlayer(-1, 0);
        else if (dir === 'right') movePlayer(1, 0);
      };
      btn.addEventListener('click', handler);
      btn.addEventListener('touchstart', handler, { passive: false });
    });

    // ----- кнопки -----
    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    
    document.getElementById('resetBtn').addEventListener('click', resetLevel);
    document.getElementById('resetBtn').addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    
    document.getElementById('nextBtn').addEventListener('click', nextLevel);
    document.getElementById('nextBtn').addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    
    nextLevelBtn.addEventListener('click', nextLevel);
    nextLevelBtn.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });

    // ----- клавиатура (для ПК) -----
    function handleKeydown(e) {
      if (!gameStarted) return;
      if (e.key.startsWith('Arrow')) {
        e.preventDefault();
        if (e.key === 'ArrowUp') movePlayer(0, -1);
        else if (e.key === 'ArrowDown') movePlayer(0, 1);
        else if (e.key === 'ArrowLeft') movePlayer(-1, 0);
        else if (e.key === 'ArrowRight') movePlayer(1, 0);
      } else if (e.key === 'r' || e.key === 'R') resetLevel();
      else if (e.key === 'n' || e.key === 'N') nextLevel();
      else if (e.key === 'Enter' && isWin) nextLevel();
    }
    window.addEventListener('keydown', handleKeydown);

    // Предотвращаем скролл при касании canvas
    canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });

    console.log('🎮 Игра готова! Работает на телефоне и ПК.');
  })();
</script>
</body>
</html>
